plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.deeptrade.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.deeptrade.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // ========== 新增：解决 Java 1.8 和 17 冲突的配置 ==========
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
    // ======================================================
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
}